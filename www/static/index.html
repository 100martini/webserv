<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: white;
            color: black;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: black;
            color: white;
            border-bottom: 2px solid black;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: normal;
            letter-spacing: 1px;
        }
        .back-link {
            text-decoration: none;
            color: white;
            border: 1px solid white;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .back-link:hover {
            background: white;
            color: black;
        }
        main {
            flex: 1;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
        }
        .description {
            padding: 1.5rem;
            border: 1px solid #ddd;
            margin-bottom: 2rem;
            text-align: center;
        }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        .media-item {
            border: 2px solid black;
            padding: 1rem;
            text-align: center;
            transition: background 0.2s ease;
        }
        .media-item:hover {
            background: #f5f5f5;
        }
        .media-item img,
        .media-item video {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border: 1px solid #ddd;
            margin-bottom: 0.75rem;
        }
        .media-item audio {
            width: 100%;
            margin-bottom: 0.75rem;
        }
        .media-name {
            font-size: 0.9rem;
            word-break: break-all;
            margin-bottom: 0.5rem;
        }
        .media-type {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 0.75rem;
        }
        .button-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }
        .download-link, .delete-btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border: 1px solid black;
            text-decoration: none;
            color: black;
            font-size: 0.8rem;
            transition: all 0.2s ease;
            background: white;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        .download-link:hover {
            background: black;
            color: white;
        }
        .delete-btn {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .delete-btn:hover {
            background: #e74c3c;
            color: white;
        }
        .deleted {
            opacity: 0.3;
            pointer-events: none;
        }
        .status-message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border: 2px solid black;
            background: white;
            display: none;
            z-index: 1000;
        }
        .status-message.show {
            display: block;
        }
        .status-message.success {
            border-color: #2ecc71;
            background: #2ecc71;
            color: white;
        }
        .status-message.error {
            border-color: #e74c3c;
            background: #e74c3c;
            color: white;
        }
        footer {
            border-top: 1px solid #ddd;
            padding: 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.6;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>MEDIA GALLERY</h1>
        <a href="/" class="back-link">← HOME</a>
    </header>
    
    <div class="status-message" id="statusMessage"></div>
    
    <main>
        <div class="description">
            <p>Media files and content - Download or Delete</p>
        </div>
        
        <div class="media-grid">
            <div class="media-item" id="item-image">
                <img src="/static/media/image.png" alt="Image">
                <div class="media-name">tswira.png</div>
                <div class="media-type">image/png</div>
                <div class="button-group">
                    <a href="/static/media/image.png" class="download-link" download>DOWNLOAD</a>
                    <button class="delete-btn" onclick="deleteFile('/static/media/image.png', 'item-image')">DELETE</button>
                </div>
            </div>
            
            <div class="media-item" id="item-video">
                <video controls>
                    <source src="/static/media/video.mp4" type="video/mp4">
                </video>
                <div class="media-name">ⴻⴽⵔⵣ.mp4</div>
                <div class="media-type">video/mp4</div>
                <div class="button-group">
                    <a href="/static/media/video.mp4" class="download-link" download>DOWNLOAD</a>
                    <button class="delete-btn" onclick="deleteFile('/static/media/video.mp4', 'item-video')">DELETE</button>
                </div>
            </div>
            
            <div class="media-item" id="item-audio">
                <audio controls>
                    <source src="/static/media/audio.mp3" type="audio/mpeg">
                </audio>
                <div class="media-name">اوووووف.mp3</div>
                <div class="media-type">audio/mp3</div>
                <div class="button-group">
                    <a href="/static/media/audio.mp3" class="download-link" download>DOWNLOAD</a>
                    <button class="delete-btn" onclick="deleteFile('/static/media/audio.mp3', 'item-audio')">DELETE</button>
                </div>
            </div>
            
            <div class="media-item" id="item-document">
                <div style="height: 200px; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; margin-bottom: 0.75rem;">
                    <span style="font-size: 3rem;">📄</span>
                </div>
                <div class="media-name">document.pdf</div>
                <div class="media-type">application/pdf</div>
                <div class="button-group">
                    <a href="/static/media/document.pdf" class="download-link" download>DOWNLOAD</a>
                    <button class="delete-btn" onclick="deleteFile('/static/media/document.pdf', 'item-document')">DELETE</button>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        webserv/1.0 - media gallery
    </footer>
    
    <script>
        function showStatus(message, isSuccess) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message show ' + (isSuccess ? 'success' : 'error');
            
            setTimeout(() => {
                statusEl.className = 'status-message';
            }, 3000);
        }
        
        async function checkFileExists(filepath, itemId) {
            try {
                const response = await fetch(filepath, { 
                    method: 'GET',
                    cache: 'no-cache'
                });
                if (!response.ok) {
                    const item = document.getElementById(itemId);
                    item.classList.add('deleted');
                }
            } catch (error) {
                const item = document.getElementById(itemId);
                item.classList.add('deleted');
            }
        }
        
        async function deleteFile(filepath, itemId) {
            if (!confirm('Are you sure you want to delete this file?')) {
                return;
            }
            
            try {
                const response = await fetch(filepath, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showStatus('File deleted successfully', true);
                    const item = document.getElementById(itemId);
                    item.classList.add('deleted');
                } else {
                    const text = await response.text();
                    showStatus('Delete failed: ' + response.status, false);
                }
            } catch (error) {
                showStatus('Error: ' + error.message, false);
            }
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            checkFileExists('/static/media/image.png', 'item-image');
            checkFileExists('/static/media/video.mp4', 'item-video');
            checkFileExists('/static/media/audio.mp3', 'item-audio');
            checkFileExists('/static/media/document.pdf', 'item-document');
        });
    </script>
</body>
</html>
